<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заявка принята</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<main class="wrap" style="padding-top:80px;text-align:center;">
  <p class="eyebrow">Готово</p>
  <h1 style="font-family:'Fraunces',serif;font-size:36px;">Спасибо, вы записаны</h1>
  <p class="hero__lede" style="margin:0 auto 32px;" id="status-text">Проверяем статус оплаты…</p>
  <a href="/" class="btn-primary" style="display:inline-block;width:auto;padding:14px 28px;text-decoration:none;">Вернуться на главную</a>
</main>
<script>
  const params = new URLSearchParams(window.location.search);
  const bookingId = params.get('booking');
  const statusText = document.getElementById('status-text');
  if (bookingId) {
    fetch(`/api/bookings/${bookingId}`).then(r => r.json()).then(b => {
      if (b.payment_status === 'paid') {
        statusText.textContent = `Оплата подтверждена. Ждём вас ${b.date} в ${b.time}.`;
      } else {
        statusText.textContent = 'Платёж обрабатывается — подтверждение придёт в течение пары минут.';
      }
    }).catch(() => {
      statusText.textContent = 'Не удалось проверить статус, но заявка сохранена.';
    });
  }
</script>
</body>
</html>
