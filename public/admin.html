<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ — список заявок</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
  .admin-wrap{max-width:1000px;}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--line);}
  th,td{text-align:left;padding:12px 14px;font-size:14px;border-bottom:1px solid var(--line);}
  th{background:#F0F1F5;font-weight:600;color:var(--ink-soft);}
  tr:last-child td{border-bottom:none;}
  .badge{padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700;}
  .badge.paid{background:#DFF3E7;color:var(--success);}
  .badge.pending{background:#FFF3DE;color:var(--amber-deep);}
  .badge.cancelled{background:#FBE2E2;color:var(--error);}
  .login-box{max-width:360px;margin:100px auto;background:#fff;padding:32px;border-radius:14px;border:1px solid var(--line);}
  .login-box input{width:100%;padding:11px;border:1.5px solid var(--line);border-radius:9px;margin-bottom:14px;font-size:15px;}
  .refresh{float:right;}
  .cancel-btn{padding:6px 12px;border:1.5px solid var(--error);border-radius:8px;background:#fff;color:var(--error);font-weight:600;font-size:12.5px;cursor:pointer;}
  .cancel-btn:disabled{opacity:.4;cursor:not-allowed;}
</style>
</head>
<body>

<div id="login-view" class="login-box" style="display:none;">
  <h2 style="font-family:'Fraunces',serif;margin-top:0;">Вход в админку</h2>
  <input type="password" id="password" placeholder="Пароль">
  <button class="btn-primary" id="login-btn">Войти</button>
  <p class="error" id="login-error"></p>
</div>

<main class="wrap admin-wrap" id="admin-view" style="display:none;padding-top:40px;">
  <h1 style="font-family:'Fraunces',serif;">Список заявок <button class="curr-btn refresh" id="refresh-btn">Обновить</button></h1>
  <table>
    <thead>
      <tr>
        <th>Дата / время</th><th>Услуга</th><th>Клиент</th><th>Телефон</th><th>Сумма</th><th>Оплата</th><th>Статус</th><th></th>
      </tr>
    </thead>
    <tbody id="bookings-body"></tbody>
  </table>
</main>

<script src="/admin.js"></script>
</body>
</html>
