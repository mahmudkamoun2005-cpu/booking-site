<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ — заявки «Брейк Навсегда»</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<style>
  .admin-wrap{max-width:1100px;padding-top:40px;}
  table{width:100%;border-collapse:collapse;background:var(--bg-panel);border-radius:10px;overflow:hidden;border:1px solid var(--line);}
  th,td{text-align:left;padding:12px 14px;font-size:13.5px;border-bottom:1px solid var(--line);}
  th{background:var(--bg-panel-alt);font-weight:600;color:var(--text-dim);font-family:var(--font-mono);text-transform:uppercase;font-size:11px;letter-spacing:.04em;}
  tr:last-child td{border-bottom:none;}
  .badge{padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700;font-family:var(--font-mono);}
  .badge.paid{background:#173829;color:#4ADE80;}
  .badge.pending{background:#3A2A0E;color:var(--amber);}
  .badge.cancelled{background:#3A1414;color:#F87171;}
  .login-box{max-width:380px;margin:100px auto;background:var(--bg-panel);padding:32px;border-radius:14px;border:1px solid var(--line);}
  .login-box input{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:8px;margin-bottom:14px;font-size:15px;background:var(--bg-panel-alt);color:var(--text);}
  .refresh{float:right;}
  .cancel-btn{padding:6px 12px;border:1.5px solid var(--red);border-radius:6px;background:transparent;color:var(--red);font-weight:600;font-size:12px;cursor:pointer;font-family:var(--font-mono);}
  .cancel-btn:disabled{opacity:.4;cursor:not-allowed;}
</style>
</head>
<body>

<div id="login-view" class="login-box" style="display:none;">
  <h2 style="font-family:'Oswald',sans-serif;margin-top:0;color:#fff;">Вход в админку</h2>
  <input type="password" id="password" placeholder="Пароль">
  <button class="btn-primary btn-full" id="login-btn">Войти</button>
  <p class="error" id="login-error"></p>
</div>

<main class="wrap admin-wrap" id="admin-view" style="display:none;">
  <h1 style="font-family:'Oswald',sans-serif;color:#fff;">Заявки на «Брейк Навсегда» <button class="curr-btn refresh" id="refresh-btn">Обновить</button></h1>
  <table>
    <thead>
      <tr>
        <th>Дата</th><th>ФИО / Никнейм</th><th>Номинация</th><th>МК</th><th>Телефон</th><th>Сумма</th><th>Оплата</th><th>Статус</th><th></th>
      </tr>
    </thead>
    <tbody id="reg-body"></tbody>
  </table>
</main>

<script src="/admin.js"></script>
</body>
</html>
